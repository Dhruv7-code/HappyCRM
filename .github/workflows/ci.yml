name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — build + test
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (ASP.NET Core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore InternalDashboard.slnx

      - name: Build
        run: dotnet build InternalDashboard.slnx --no-restore --configuration Release

      - name: Run NUnit tests
        run: dotnet test InternalDashboard.slnx --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.NEON_CONNECTION_STRING }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — install + build
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
